[build]
target = "index.html"
# The dashboard is served at the site root by the backend, so emitted asset
# URLs must be root-relative.
public_url = "/"

[serve]
port = 8080
# Proxy API calls to the running backend during `trunk serve`.

[[proxy]]
backend = "http://localhost:20130/v1"

[[proxy]]
backend = "http://localhost:20130/health"

[[proxy]]
backend = "http://localhost:20130/version"
