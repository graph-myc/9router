<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>M Y C — Aggregator</title>
    <link data-trunk rel="rust" data-wasm-opt="z" />
    <style>
      :root {
        --bg: #0b0b0c; --panel: #161617; --panel2: #1c1c1e; --border: #2a2a2d;
        --text: #e7e7e9; --muted: #8a8a90; --accent: #ef6b3b; --accent2: #f0823f;
        --radius: 14px;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        background: var(--bg); color: var(--text);
        font-family: ui-sans-serif, system-ui, "Segoe UI", Roboto, Arial, sans-serif;
        font-size: 14px;
      }
      .layout { display: flex; min-height: 100vh; }
      .sidebar {
        width: 244px; flex: 0 0 244px; background: #101011;
        border-right: 1px solid var(--border); padding: 16px 14px;
        display: flex; flex-direction: column; gap: 3px;
        height: 100vh; position: sticky; top: 0; overflow-y: auto;
      }
      .brand { display: flex; align-items: center; gap: 11px; padding: 6px 8px 18px; }
      .brand .logo {
        width: 36px; height: 36px; border-radius: 10px;
        background: linear-gradient(135deg, var(--accent), #b5321e);
        display: grid; place-items: center; font-size: 18px; color: #fff;
      }
      .brand h1 { font-size: 15px; margin: 0; line-height: 1.15; }
      .brand small { color: var(--muted); font-size: 11px; }
      .navitem {
        display: flex; align-items: center; gap: 11px; padding: 9px 12px;
        border-radius: 10px; color: var(--muted); cursor: pointer; font-size: 14px;
        border: none; background: none; width: 100%; text-align: left; font-family: inherit;
      }
      .navitem .ic { width: 18px; text-align: center; }
      .navitem:hover { background: #1a1a1c; color: var(--text); }
      .navitem.active { background: rgba(239, 107, 59, 0.13); color: var(--accent); }
      .navitem:disabled { opacity: 0.38; cursor: default; }
      .navgroup {
        color: #5a5a60; font-size: 10.5px; letter-spacing: 0.09em;
        text-transform: uppercase; padding: 16px 12px 6px;
      }
      .main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
      .topbar {
        display: flex; align-items: center; justify-content: space-between;
        padding: 18px 26px; border-bottom: 1px solid var(--border);
      }
      .topbar h2 { margin: 0; font-size: 18px; }
      .topbar .sub { color: var(--muted); font-size: 12px; margin-top: 3px; }
      .badge {
        font-size: 11px; color: var(--muted); border: 1px solid var(--border);
        border-radius: 999px; padding: 3px 9px;
      }
      .badge.ok { color: #5fd0a8; border-color: #5fd0a855; }
      .content { padding: 24px 26px; display: flex; flex-direction: column; gap: 18px; max-width: 940px; }
      .card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 22px; }
      .card h3 { margin: 0 0 16px; font-size: 15px; display: flex; align-items: center; gap: 9px; }
      .row { display: flex; align-items: center; gap: 10px; }
      .grid { display: flex; flex-direction: column; gap: 10px; }
      .input {
        flex: 1; background: #0e0e0f; border: 1px solid var(--border); border-radius: 10px;
        padding: 10px 12px; color: var(--text); font-size: 13px; font-family: inherit;
      }
      input.input, code, .codeblock { font-family: ui-monospace, "SF Mono", Menlo, monospace; }
      textarea.input { resize: vertical; }
      select.input { flex: 0 0 auto; min-width: 280px; }
      .btn {
        background: var(--accent); color: #fff; border: none; border-radius: 10px;
        padding: 10px 16px; font-size: 13px; cursor: pointer; font-weight: 600; font-family: inherit;
      }
      .btn:hover { background: var(--accent2); }
      .btn:disabled { opacity: 0.55; cursor: default; }
      .btn.ghost { background: #1c1c1e; color: var(--text); border: 1px solid var(--border); }
      .chip { font-size: 11px; padding: 3px 10px; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); white-space: nowrap; }
      .chip.fallback { color: #6ea8fe; border-color: #6ea8fe55; background: #6ea8fe14; }
      .chip.round-robin { color: #5fd0a8; border-color: #5fd0a855; background: #5fd0a814; }
      .chip.fusion { color: #c792ea; border-color: #c792ea55; background: #c792ea14; }
      .muted { color: var(--muted); font-size: 13px; }
      .modelrow {
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
        padding: 11px 13px; border: 1px solid var(--border); border-radius: 10px; background: var(--panel2);
      }
      .codeblock {
        background: #0e0e0f; border: 1px solid var(--border); border-radius: 10px; padding: 13px;
        white-space: pre-wrap; font-size: 12.5px; max-height: 360px; overflow: auto; line-height: 1.5;
      }
    </style>
  </head>
  <body></body>
</html>
